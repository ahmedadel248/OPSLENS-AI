apiVersion: v1
kind: Namespace
metadata:
  name: opslens-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-bad-port
  namespace: opslens-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-bad-port
  template:
    metadata:
      labels:
        app: backend-bad-port
    spec:
      containers:
        - name: backend
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 9999
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: opslens-lab
spec:
  selector:
    app: backend-bad-port
  ports:
    - name: http
      port: 80
      targetPort: 9999
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-client
  namespace: opslens-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-client
  template:
    metadata:
      labels:
        app: frontend-client
    spec:
      containers:
        - name: frontend-client
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                echo "$(date) Frontend trying to call backend-svc..."
                wget -qO- --timeout=3 http://backend-svc.opslens-lab.svc.cluster.local:80 || echo "ConnectionRefusedError: backend service connection refused on backend-svc:80"
                sleep 6
              done
