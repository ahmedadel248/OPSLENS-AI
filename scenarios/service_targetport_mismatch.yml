apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstack-backend-bad-port
  namespace: opslens-demo
  labels:
    scenario: fullstack-multi-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fullstack-backend-bad-port
  template:
    metadata:
      labels:
        app: fullstack-backend-bad-port
        scenario: fullstack-multi-agent
    spec:
      containers:
        - name: backend
          image: nginx
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 9999
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fullstack-backend-svc
  namespace: opslens-demo
  labels:
    scenario: fullstack-multi-agent
spec:
  selector:
    app: fullstack-backend-bad-port
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9999
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstack-frontend-client
  namespace: opslens-demo
  labels:
    scenario: fullstack-multi-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fullstack-frontend-client
  template:
    metadata:
      labels:
        app: fullstack-frontend-client
        scenario: fullstack-multi-agent
    spec:
      containers:
        - name: frontend
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "$(date) Frontend trying to call fullstack-backend-svc..."
                wget -T 2 -qO- http://fullstack-backend-svc.opslens-demo.svc.cluster.local:80 || echo "ConnectionRefusedError: backend service connection refused on fullstack-backend-svc:80"
                sleep 5
              done
