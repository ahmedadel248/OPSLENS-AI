apiVersion: v1
kind: Namespace
metadata:
  name: opslens-chaos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: opslens-chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
        tier: backend
    spec:
      containers:
        - name: api-backend
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-backend-svc
  namespace: opslens-chaos
spec:
  selector:
    app: api-backend-wrong
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-client
  namespace: opslens-chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-client
  template:
    metadata:
      labels:
        app: frontend-client
        tier: frontend
    spec:
      containers:
        - name: frontend-client
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                echo "$(date) Frontend trying to call api-backend-svc..."
                wget -qO- --timeout=3 http://api-backend-svc.opslens-chaos.svc.cluster.local:80 || echo "ConnectionRefusedError: backend service unreachable on api-backend-svc:80"
                sleep 6
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-image-worker
  namespace: opslens-chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-image-worker
  template:
    metadata:
      labels:
        app: broken-image-worker
        tier: worker
    spec:
      containers:
        - name: broken-image-worker
          image: nginx:this-tag-does-not-exist-404
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashing-worker
  namespace: opslens-chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashing-worker
  template:
    metadata:
      labels:
        app: crashing-worker
        tier: worker
    spec:
      containers:
        - name: crashing-worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "DatabaseConnectionError: failed to connect to postgres:5432"
              echo "RuntimeError: worker startup failed"
              exit 1
